<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f7f7f7;
      color: #333;
      padding: 20px;
    }

    h1 {
      font-size: 100px;
      margin: 0;
      color: #ff6f61;
    }

    h2 {
      font-size: 24px;
      margin: 10px 0 30px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: white;
      background-color: #007bff;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 18px;
    }

    a:hover {
      background-color: #0056b3;
    }

    .illustration {
      margin: 30px auto;
      width: 300px;
      height: 300px;
      background: url('https://via.placeholder.com/300x300.png?text=404+Illustration') no-repeat center center;
      background-size: cover;
    }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Oops! Page not found</h2>
    <div class="illustration"></div>
    <p>The page you're looking for doesn't exist or may have been moved.</p>
    <a href="index.html">Go Back Home</a>
  </div>
</body>
</html>
