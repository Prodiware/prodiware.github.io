<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Prodiware</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js"></script>
</head>
<body>
  <header>
    <h1>Prodiware - Login</h1>
  </header>
  <main>
    <div id="login-container">
      <h2>Login to Your Account</h2>
      <input type="email" id="login-email" placeholder="Email" required>
      <input type="password" id="login-password" placeholder="Password" required>
      <button id="login-button">Login</button>
      <p>Don't have an account? <a href="signup.html">Signup here</a>.</p>
      <div id="status-message"></div>
    </div>
  </main>
  <footer>
    <p>&copy; 2025 Prodiware. All rights reserved.</p>
  </footer>

  <!-- Link to the external login.js script -->
  <script src="login.js"></script>
</body>
</html>
