<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - Prodiware</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js"></script>
  <script type="module" src="signup.js" defer></script>
</head>
<body>
  <header>
    <h1>Prodiware - Signup</h1>
  </header>
  <main>
    <div id="signup-container">
      <h2>Create an Account</h2>
      <input type="text" id="signup-username" placeholder="Username" required>
      <input type="email" id="signup-email" placeholder="Email" required>
      <input type="password" id="signup-password" placeholder="Password" required>
      <button id="signup-button">Signup</button>
      <p>Already have an account? <a href="login.html">Login here</a>.</p>
      <div id="status-message"></div>
    </div>
  </main>
  <footer>
    <p>&copy; 2025 Prodiware. All rights reserved.</p>
  </footer>
</body>
</html>
